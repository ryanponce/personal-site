{% extends "base.html" %}

{% block title %}{{ section.title }} - {{ config.title }}{% endblock title %}

{% block back %}<p><a href="/">← Back to Home</a></p>{% endblock back %}

{% block content %}
  <article>
    <h2>{{ section.title }}</h2>
    {{ section.content | safe }}
    <div class="photo-grid">
      {% for page in section.pages %}
        <a class="photo-tile" href="{{ page.path | safe }}">
          <img src="{{ page.extra.photo }}" alt="{{ page.title }}" loading="lazy" decoding="async" />
        </a>
      {% endfor %}
    </div>
  </article>
{% endblock content %}
