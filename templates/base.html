<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}" />
    <link rel="stylesheet" href="{{ get_url(path='style.css', cachebust=true) | replace(from=config.base_url, to='') | safe }}" />
    {% if config.generate_feeds %}<link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path='atom.xml') | replace(from=config.base_url, to='') | safe }}" />{% endif %}
  </head>
  <body>
    <header>
      <h1><a href="/">Ryan Ponce</a></h1>
      {% block back %}{% endblock %}
    </header>
    <main>
      {% block content %}{% endblock content %}
    </main>
    <footer>
      <p>&copy; {{ now() | date(format="%Y") }}</p>
    </footer>
    <script>
      for (const a of document.querySelectorAll("main a, footer a")) {
        if (a.querySelector("img")) continue; // don't decorate image links
        const href = a.getAttribute("href") || "";
        const inner = a.innerHTML;
        const url = document.createElement("span");
        url.className = "url";
        url.textContent = href;
        a.innerHTML = "";
        a.append("[");
        const text = document.createElement("span");
        text.innerHTML = inner;
        a.append(text, "](", url, ")");
      }
    </script>
  </body>
</html>
